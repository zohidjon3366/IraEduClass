name: Build IraEduClass Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project files
        working-directory: src
        run: flutter create --platforms=android,web --project-name iraeduclass_flutter .

      - name: Get dependencies
        working-directory: src
        run: flutter pub get

      - name: Build release APK
        working-directory: src
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iraeduclass-release-apk
          path: src/build/app/outputs/flutter-apk/app-release.apk
